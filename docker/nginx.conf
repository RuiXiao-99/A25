events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream services
    upstream agent_framework {
        server agent-framework:8001;
    }

    upstream knowledge_middleware {
        server knowledge-middleware:8002;
    }

    upstream intelligent_engine {
        server intelligent-engine:8005;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API Gateway
        location /api/v1/agents {
            proxy_pass http://agent_framework/api/v1/agents;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/knowledge {
            proxy_pass http://knowledge_middleware/api/v1/knowledge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/qa {
            proxy_pass http://intelligent_engine/api/v1/qa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/grading {
            proxy_pass http://intelligent_engine/api/v1/grading;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/warning {
            proxy_pass http://intelligent_engine/api/v1/warning;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/exercise {
            proxy_pass http://intelligent_engine/api/v1/exercise;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
